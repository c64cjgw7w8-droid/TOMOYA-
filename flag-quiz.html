<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="国旗当てクイズ">
<title>国旗当てクイズ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF3E4;
    --paper-dark:#F0E4CC;
    --ink:#1B3358;
    --coral:#FF6B4A;
    --yellow:#FFC93C;
    --teal:#2EC4B6;
    --line: rgba(27,51,88,0.15);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:
      radial-gradient(circle at 20% 10%, rgba(46,196,182,0.10), transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(255,201,60,0.15), transparent 45%),
      var(--paper);
    font-family:'Nunito', sans-serif;
    color:var(--ink);
    overscroll-behavior:none;
    user-select:none;
  }
  #app{
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: max(20px, env(safe-area-inset-top)) 18px max(20px, env(safe-area-inset-bottom));
  }

  header{
    width:100%;
    max-width:420px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .title{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:22px;
    letter-spacing:0.3px;
  }
  .title span{color:var(--coral);}
  .stats{
    display:flex;
    gap:8px;
  }
  .pill{
    background:white;
    border:2px solid var(--line);
    border-radius:999px;
    padding:6px 12px;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:14px;
    display:flex;
    align-items:center;
    gap:4px;
    box-shadow: 0 2px 0 var(--line);
  }

  .passport{
    width:100%;
    max-width:420px;
    background:white;
    border-radius:28px;
    border:3px solid var(--ink);
    padding:28px 20px 24px;
    position:relative;
    box-shadow: 0 8px 0 var(--line), 0 12px 24px rgba(27,51,88,0.12);
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:0;
  }
  .eyebrow{
    font-family:'Baloo 2', sans-serif;
    font-size:13px;
    font-weight:700;
    color:var(--teal);
    text-transform:uppercase;
    letter-spacing:1.5px;
    margin-bottom:6px;
  }
  .question{
    font-family:'Baloo 2', sans-serif;
    font-size:18px;
    font-weight:700;
    margin-bottom:18px;
    text-align:center;
  }

  .flag-wrap{
    width:180px;
    height:180px;
    border-radius:24px;
    background:var(--paper-dark);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:96px;
    margin-bottom:22px;
    position:relative;
    box-shadow: inset 0 0 0 3px var(--line);
    animation: pop-in 0.35s ease;
  }
  @keyframes pop-in{
    from{ transform: scale(0.7) rotate(-6deg); opacity:0; }
    to{ transform: scale(1) rotate(0); opacity:1; }
  }

  .choices{
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  .choice{
    font-family:'Nunito', sans-serif;
    font-weight:800;
    font-size:15px;
    color:var(--ink);
    background:var(--paper);
    border:2px solid var(--line);
    border-radius:16px;
    padding:14px 8px;
    cursor:pointer;
    box-shadow: 0 3px 0 var(--line);
    transition: transform 0.08s ease;
  }
  .choice:active{ transform: translateY(2px); box-shadow:0 1px 0 var(--line); }
  .choice.correct{
    background:var(--teal);
    border-color:var(--teal);
    color:white;
  }
  .choice.wrong{
    background:var(--coral);
    border-color:var(--coral);
    color:white;
  }
  .choice[disabled]{ pointer-events:none; }

  .stamp{
    position:absolute;
    top:38%;
    left:50%;
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:30px;
    color:var(--coral);
    border:5px solid var(--coral);
    border-radius:14px;
    padding:6px 18px;
    transform:translate(-50%,-50%) rotate(-14deg) scale(0);
    opacity:0;
    pointer-events:none;
    z-index:5;
    background:rgba(255,255,255,0.85);
  }
  .stamp.show{
    animation: stamp-in 0.5s cubic-bezier(.2,1.6,.4,1) forwards;
  }
  @keyframes stamp-in{
    0%{ transform:translate(-50%,-50%) rotate(-14deg) scale(2.4); opacity:0; }
    60%{ opacity:1; }
    100%{ transform:translate(-50%,-50%) rotate(-14deg) scale(1); opacity:1; }
  }

  .next-btn{
    margin-top:18px;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:16px;
    color:white;
    background:var(--ink);
    border:none;
    border-radius:999px;
    padding:12px 28px;
    box-shadow:0 3px 0 rgba(0,0,0,0.25);
    cursor:pointer;
  }
  .next-btn:active{ transform:translateY(2px); box-shadow:none; }
  .hidden{ display:none !important; }

  .result{
    text-align:center;
  }
  .result .big{
    font-family:'Baloo 2', sans-serif;
    font-size:48px;
    font-weight:800;
    color:var(--coral);
    margin:6px 0;
  }
  .confetti{
    position:fixed;
    top:-10px;
    width:8px; height:14px;
    border-radius:2px;
    opacity:0.9;
    pointer-events:none;
    animation: fall linear forwards;
  }
  @keyframes fall{
    to{ transform: translateY(110vh) rotate(360deg); opacity:0.3; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="title">国旗当て<span>クイズ</span></div>
    <div class="stats">
      <div class="pill">🔥<span id="streak">0</span></div>
      <div class="pill">⭐<span id="score">0</span>/<span id="total">0</span></div>
    </div>
  </header>

  <div class="passport" id="game">
    <div class="eyebrow" id="progress">第 1 問</div>
    <div class="question">この国旗は、どこの国？</div>
    <div class="flag-wrap">
      <div id="flagEmoji">🏳️</div>
      <div class="stamp" id="stamp">正解!</div>
    </div>
    <div class="choices" id="choices"></div>
    <button class="next-btn hidden" id="nextBtn">次へ →</button>

</div>

let deck = [];
let qIndex = 0;
let score = 0;
let streak = 0;
let answered = false;

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

const QUESTIONS_PER_GAME = 20;

function newGame(){
  deck = shuffle(COUNTRIES).slice(0, QUESTIONS_PER_GAME);
  qIndex = 0; score = 0; streak = 0; answered = false;
  document.getElementById('total').textContent = deck.length;
  updateStats();
  renderQuestion();
}

function updateStats(){
  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak;
}

function renderQuestion(){
  answered = false;
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.classList.add('hidden');
  document.getElementById('stamp').classList.remove('show');

  if(qIndex >= deck.length){
    showResult();
    return;
  }

  document.getElementById('progress').textContent = `第 ${qIndex+1} 問`;
  const current = deck[qIndex];
  document.getElementById('flagEmoji').textContent = current.flag;

  const wrongPool = COUNTRIES.filter(c => c.name !== current.name);
  const wrongs = shuffle(wrongPool).slice(0,3);
  const options = shuffle([current, ...wrongs]);

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = opt.name;
    btn.onclick = () => selectAnswer(btn, opt.name === current.name);
    choicesEl.appendChild(btn);
  });
}

function selectAnswer(btn, isCorrect){
  if(answered) return;
  answered = true;
  const buttons = document.querySelectorAll('.choice');
  buttons.forEach(b => b.disabled = true);

  if(isCorrect){
    btn.classList.add('correct');
    score++;
    streak++;
    document.getElementById('stamp').classList.add('show');
    burstConfetti();
  } else {
    btn.classList.add('wrong');
    streak = 0;
    buttons.forEach(b => { if(b.textContent === deck[qIndex].name) b.classList.add('correct'); });
  }
  updateStats();
  document.getElementById('nextBtn').classList.remove('hidden');
}

function burstConfetti(){
  const colors = ['#FF6B4A','#FFC93C','#2EC4B6','#1B3358'];
  for(let i=0;i<18;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (1.2 + Math.random()*0.8) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 2200);
  }
}

document.getElementById('nextBtn').onclick = () => {
  qIndex++;
  renderQuestion();
};

function showResult(){
  const game = document.getElementById('game');
  game.innerHTML = `
    <div class="result">
      <div class="eyebrow">クリア!</div>
      <div class="question">結果発表</div>
      <div class="big">${score} / ${deck.length}</div>
      <div style="margin-bottom:18px;">${streak >= 3 ? 'すごい連続正解!🎉' : 'よく頑張ったね!👏'}</div>
      <button class="next-btn" id="retryBtn">もう一度遊ぶ</button>
    </div>
  `;
  document.getElementById('retryBtn').onclick = newGame;
}

newGame();
