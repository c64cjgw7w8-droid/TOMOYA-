<title>国旗当てクイズ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF3E4;
    --paper-dark:#F0E4CC;
    --ink:#1B3358;
    --coral:#FF6B4A;
    --yellow:#FFC93C;
    --teal:#2EC4B6;
    --line: rgba(27,51,88,0.15);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:
      radial-gradient(circle at 20% 10%, rgba(46,196,182,0.10), transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(255,201,60,0.15), transparent 45%),
      var(--paper);
    font-family:'Nunito', sans-serif;
    color:var(--ink);
    overscroll-behavior:none;
    user-select:none;
  }
  #app{
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: max(20px, env(safe-area-inset-top)) 18px max(20px, env(safe-area-inset-bottom));
  }

  header{
    width:100%;
    max-width:420px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .title{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:22px;
    letter-spacing:0.3px;
  }
  .title span{color:var(--coral);}
  .stats{
    display:flex;
    gap:8px;
  }
  .pill{
    background:white;
    border:2px solid var(--line);
    border-radius:999px;
    padding:6px 12px;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:14px;
    display:flex;
    align-items:center;
    gap:4px;
    box-shadow: 0 2px 0 var(--line);
  }

  .passport{
    width:100%;
    max-width:420px;
    background:white;
    border-radius:28px;
    border:3px solid var(--ink);
    padding:28px 20px 24px;
    position:relative;
    box-shadow: 0 8px 0 var(--line), 0 12px 24px rgba(27,51,88,0.12);
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:0;
    overflow-y:auto;
  }
  .eyebrow{
    font-family:'Baloo 2', sans-serif;
    font-size:13px;
    font-weight:700;
    color:var(--teal);
    text-transform:uppercase;
    letter-spacing:1.5px;
    margin-bottom:6px;
    text-align:center;
  }
  .question{
    font-family:'Baloo 2', sans-serif;
    font-size:18px;
    font-weight:700;
    margin-bottom:18px;
    text-align:center;
  }

  .flag-wrap{
    width:180px;
    height:180px;
    border-radius:24px;
    background:var(--paper-dark);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:96px;
    margin-bottom:22px;
    position:relative;
    box-shadow: inset 0 0 0 3px var(--line);
    animation: pop-in 0.35s ease;
    flex-shrink:0;
  }
  .name-wrap{
    width:100%;
    min-height:100px;
    border-radius:24px;
    background:var(--paper-dark);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-family:'Baloo 2', sans-serif;
    font-weight:800;

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// ---------- localStorage highscores ----------
function hsKey(){
  return `flagquiz_hs_${selection.mode}_${selection.category}_${selection.direction}`;
}
function getHighScore(mode, category, direction){
  const key = `flagquiz_hs_${mode}_${category}_${direction}`;
  const v = localStorage.getItem(key);
  return v ? parseInt(v, 10) : 0;
}
function setHighScoreIfBetter(mode, category, direction, value){
  const key = `flagquiz_hs_${mode}_${category}_${direction}`;
  const current = getHighScore(mode, category, direction);
  if(value > current){
    localStorage.setItem(key, String(value));
    return true;
  }
  return false;
}

// ---------- pool building ----------
function getPool(){
  let pool = COUNTRIES.filter(c => selection.category === 'capital' ? !!c.capital : true);
  if(selection.continent){
    pool = pool.filter(c => c.continent === selection.continent);
  }
  return pool;
}
function answerField(){
  return selection.category === 'capital' ? 'capital' : 'name';
}

}

function burstConfetti(){
  const colors = ['#FF6B4A','#FFC93C','#2EC4B6','#1B3358'];
  for(let i=0;i<18;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (1.2 + Math.random()*0.8) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 2200);
  }
}

// ---------- QUIZ ENGINE ----------
function startGame(){
  showStatsBar(true);
  const pool = getPool();

  if(pool.length < 4){
    gameEl().innerHTML = `
      <div class="eyebrow">おっと!</div>
      <div class="question">この地域だと もんだいが すくなすぎるよ</div>
      <button class="next-btn" id="backBtn2">もどる</button>
    `;
    document.getElementById('backBtn2').onclick = renderContinentMenu;
    return;
  }

  score = 0; streak = 0; qIndex = 0; answered = false;
  clearInterval(timerInterval);

  if(selection.mode === 'survival'){
    deck = shuffle(pool); // whole pool, ends on first mistake
  } else if(selection.mode === 'timeattack'){
    deck = shuffle(pool);
    timeLeft = TIME_ATTACK_SECONDS;
  } else {
    const n = parseInt(selection.mode, 10);
    deck = shuffle(pool).slice(0, Math.min(n, pool.length));
  }

  document.getElementById('total').textContent =
    selection.mode === 'survival' ? '∞' :
    selection.mode === 'timeattack' ? `${TIME_ATTACK_SECONDS}s` :
    deck.length;

  updateStats();
  renderQuestion();
}

  const field = answerField();
  const modeLabel =
    selection.mode === 'survival' ? 'サバイバル' :
    selection.mode === 'timeattack' ? `タイムアタック <span id="timerDisplay">${timeLeft}</span>秒` :
    `第 ${qIndex+1} / ${deck.length} 問`;

  const promptText = selection.direction === 'normal'
    ? (selection.category === 'capital' ? 'この国旗の 首都は?' : 'この国旗は、どこの国?')
    : (selection.category === 'capital' ? 'この首都の 国旗は?' : 'この国の 国旗は?');

  return {field, modeLabel, promptText};
}

    ${stageHTML}
    <div class="choices" id="choices"></div>
    <button class="next-btn hidden" id="nextBtn">次へ →</button>
  `;

  if(selection.direction === 'normal'){
    document.getElementById('stamp').classList.remove('show');
  }

  // build options
  const wrongPool = getPool().filter(c => c[field] !== current[field]);
  const wrongs = shuffle(wrongPool).slice(0,3);
  const options = shuffle([current, ...wrongs]);

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice' + (selection.direction === 'reverse' ? ' flag-choice' : '');
    btn.textContent = selection.direction === 'reverse' ? opt.flag : opt[field];
    btn.onclick = () => selectAnswer(btn, opt[field] === current[field]);
    choicesEl.appendChild(btn);
  });

  if(selection.mode === 'timeattack'){
    startTimerIfNeeded();
  }
}

function startTimerIfNeeded(){
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const disp = document.getElementById('timerDisplay');
    if(disp) disp.textContent = timeLeft;
    if(timeLeft <= 0){
      clearInterval(timerInterval);
      endTimeAttack();
    }
  }, 1000);
}

function selectAnswer(btn, isCorrect){
  if(answered) return;
  answered = true;
  const buttons = document.querySelectorAll('.choice');
  buttons.forEach(b => b.disabled = true);
  const field = answerField();
  const current = deck[qIndex];

  if(isCorrect){
    btn.classList.add('correct');
    score++;
    streak++;
    if(selection.direction === 'normal'){
      const stamp = document.getElementById('stamp');
      if(stamp) stamp.classList.add('show');
    }
    burstConfetti();
  } else {
    btn.classList.add('wrong');
    streak = 0;
    buttons.forEach(b => {
      const label = selection.direction === 'reverse' ? current.flag : current[field];
      if(b.textContent === label) b.classList.add('correct');
    });
  }
  updateStats();

  if(selection.mode === 'survival' && !isCorrect){
    setTimeout(() => endSurvival(), 700);
    return;
  }

  if(selection.mode === 'timeattack'){
    setTimeout(() => {
      qIndex++;
      renderQuestion();
    }, 500);
    return;
  }

  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('nextBtn').onclick = () => {
    qIndex++;
    renderQuestion();
  };
}

// ---------- RESULT SCREENS ----------
function showResultCleared(){
  const isPerfect = score === deck.length;
  gameEl().innerHTML = `
    <div class="result">
      <div class="eyebrow">クリア!</div>
      <div class="question">結果発表</div>
      <div class="big">${score} / ${deck.length}</div>
      <div style="margin-bottom:18px;">${isPerfect ? '全問正解!すごい!🎉' : streak >= 3 ? 'すごい連続正解!🎉' : 'よく頑張ったね!👏'}</div>
      <div class="btn-row">
        <button class="next-btn" id="retryBtn">もう一度遊ぶ</button>
        <button class="next-btn secondary" id="menuBtn">モード選択へ</button>
      </div>
    </div>
  `;
  document.getElementById('retryBtn').onclick = startGame;
  document.getElementById('menuBtn').onclick = renderCategoryMenu;
}

function endSurvival(){
  clearInterval(timerInterval);
  const isNewRecord = setHighScoreIfBetter('survival', selection.category, selection.direction, score);
  const pool = getPool();
  const isLegend = score >= pool.length;
  gameEl().innerHTML = `
    <div class="result">
      <div class="eyebrow">サバイバル終了</div>
      <div class="question">${isLegend ? '国旗博士 認定!👑' : 'ここまで正解!'}</div>
      <div class="big">${score}問</div>
      <div style="margin-bottom:10px;">${isNewRecord ? '自己ベスト更新!🎉' : `自己ベスト: ${getHighScore('survival', selection.category, selection.direction)}問`}</div>
      <div class="btn-row">
        <button class="next-btn" id="retryBtn">もう一度遊ぶ</button>
        <button class="next-btn secondary" id="menuBtn">モード選択へ</button>
      </div>
    </div>
  `;
  document.getElementById('retryBtn').onclick = startGame;
  document.getElementById('menuBtn').onclick = renderCategoryMenu;
}

function endTimeAttack(){
  const isNewRecord = setHighScoreIfBetter('timeattack', selection.category, selection.direction, score);
  gameEl().innerHTML = `
    <div class="result">
      <div class="eyebrow">タイムアップ!</div>
      <div class="question">結果発表</div>
      <div class="big">${score}問</div>
      <div style="margin-bottom:10px;">${isNewRecord ? '自己ベスト更新!🎉' : `自己ベスト: ${getHighScore('timeattack', selection.category, selection.direction)}問`}</div>
      <div class="btn-row">
        <button class="next-btn" id="retryBtn">もう一度遊ぶ</button>
        <button class="next-btn secondary" id="menuBtn">モード選択へ</button>
      </div>
    </div>
  `;
  document.getElementById('retryBtn').onclick = startGame;
  document.getElementById('menuBtn').onclick = renderCategoryMenu;
}

// ---------- init ----------
renderCategoryMenu();
</script>
