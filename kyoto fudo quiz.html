<title>京都府道クイズ</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: #dfe6ec;
    overscroll-behavior: none;
    user-select: none;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
  }
  .screen { display: none; flex-direction: column; flex: 1; }
  .screen.active { display: flex; }

  h1.title {
    text-align: center;
    font-size: 22px;
    color: #16406e;
    margin: 8px 0 4px 0;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #567;
    margin-bottom: 18px;
  }

  /* 六角形標識 */
  .hexwrap { display: flex; justify-content: center; margin: 12px 0; }
  .hexagon { position: relative; width: 160px; height: 138px; }
  .hexagon.big { width: 200px; height: 172px; }
  .hexagon.small { width: 84px; height: 74px; }
  .hexagon svg { width: 100%; height: 100%; display: block; }
  .hex-text {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; font-weight: bold;
  }
  .hex-top, .hex-bottom { font-size: 14px; letter-spacing: 12px; padding-left: 12px; }
  .hex-mid { font-size: 34px; line-height: 1; margin: 4px 0; }
  .hexagon.big .hex-top, .hexagon.big .hex-bottom { font-size: 17px; letter-spacing: 15px; padding-left: 15px; }
  .hexagon.big .hex-mid { font-size: 42px; }
  .hexagon.small .hex-top, .hexagon.small .hex-bottom { font-size: 7px; letter-spacing: 5px; padding-left: 5px; }
  .hexagon.small .hex-mid { font-size: 20px; }

  /* ボタン共通 */
  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    background: #1a5fb4;
    color: #fff;
    cursor: pointer;
  }
  .btn:active { background: #134a8f; }
  .btn.secondary { background: #ffffff; color: #1a5fb4; border: 2px solid #1a5fb4; }
  .btn.ghost { background: transparent; color: #567; border: none; font-weight: normal; font-size: 14px; }

  /* 選択グループ */
  .group { background: #fff; border-radius: 14px; padding: 14px; margin: 10px 0; }
  .group-label { font-size: 13px; color: #567; margin-bottom: 8px; font-weight: bold; }
  .option-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .option {
    flex: 1 1 auto;
    min-width: 70px;
    text-align: center;
    padding: 10px 8px;
    border-radius: 10px;
    border: 2px solid #d6dee6;
    background: #eef2f7;
    font-size: 13px;
    color: #333;
    cursor: pointer;
  }
  .option.selected { background: #1a5fb4; color: #fff; border-color: #1a5fb4; }

  /* クイズ画面 */
  .quiz-top { text-align: center; }
  .progress { text-align: center; font-size: 13px; color: #567; margin-bottom: 4px; }
  .name-card {
    background: #fff;
    border: 3px solid #1a5fb4;
    border-radius: 14px;
    padding: 20px 14px;
    font-size: 22px;
    font-weight: bold;
    color: #1a5fb4;
    text-align: center;
    margin: 10px auto;
    max-width: 320px;
  }
  .name-card ruby rt { font-size: 11px; color: #4a7fc0; }
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }
  .choice-btn {
    background: #eef2f7;
    border: 2px solid #d6dee6;
    border-radius: 12px;
    padding: 14px 6px;
    font-size: 15px;
    color: #222;
    text-align: center;
    cursor: pointer;
  }
  .choice-btn ruby rt { font-size: 10px; color: #555; }
  .choice-btn.sign { display: flex; justify-content: center; padding: 10px 4px; }
  .choice-btn.correct { background: #d7f3d7; border-color: #4caf50; }
  .choice-btn.wrong { background: #fbdada; border-color: #e53935; }
  .choice-btn.disabled { pointer-events: none; opacity: 0.6; }

  .feedback {
    text-align: center;
    font-size: 15px;
    font-weight: bold;
    min-height: 22px;
    margin-top: 10px;
  }
  .feedback.correct { color: #2e7d32; }
  .feedback.wrong { color: #c62828; }

  /* 結果画面 */
  .result-box {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    margin: 16px 0;
  }
  .result-score { font-size: 32px; font-weight: bold; color: #1a5fb4; margin: 8px 0; }
  .badge {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 18px;
    border-radius: 20px;
    background: linear-gradient(135deg,#ffd54f,#ff9800);
    color: #5a3400;
    font-weight: bold;
    font-size: 15px;
  }
  .best-record { font-size: 13px; color: #567; margin-top: 6px; }

  .footer-note { text-align: center; font-size: 11px; color: #90a0ac; margin-top: auto; padding-top: 12px; }
</style>
</head>

"num":671,"name":"尉ヶ畑布袋野線","reading":"じょうがはたほたいのせん","cat":"rural"},{"num":672,"name":"間人港線","reading":"たいざこうせん","cat":"rural"},{"num":673,"name":"浅茂川下岡線","reading":"あさもがわしもおかせん","cat":"rural"},{"num":801,"name":"京都八幡木津自転車道線","reading":"きょうとやわたきづじてんしゃどうせん","cat":"rural"},{"num":802,"name":"田井大垣自転車道線","reading":"たいおおがきじてんしゃどうせん","cat":"rural"},{"num":803,"name":"加悦岩滝自転車道線","reading":"かやいわたきじてんしゃどうせん","cat":"rural"}]
;

let state = {
  dir: 'num2name',
  range: 'all',
  mode: '5',
  pool: [],
  qIndex: 0,
  score: 0,
  total: 0,
  current: null,
  survivalStreak: 0,
  answered: false
};

function $(id){ return document.getElementById(id); }
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}
function goHome(){ showScreen('screen-home'); }
function goSetup(){ showScreen('screen-setup'); updateBestRecordDisplay(); }

function setupOptionGroup(groupId, stateKey){
  const group = $(groupId);
  group.querySelectorAll('.option').forEach(opt=>{
    opt.addEventListener('click', ()=>{
      group.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
      opt.classList.add('selected');
      state[stateKey] = opt.dataset.val;
      if(stateKey==='range' || stateKey==='dir') updateBestRecordDisplay();
    });
  });
}
setupOptionGroup('dir-options','dir');
setupOptionGroup('range-options','range');
setupOptionGroup('mode-options','mode');

function recordKey(){
  return 'fudoquiz_best_' + state.range + '_' + state.dir;
}
function getBest(){
  try { return parseInt(localStorage.getItem(recordKey())||'0',10); } catch(e){ return 0; }
}
function setBest(v){
  try { localStorage.setItem(recordKey(), String(v)); } catch(e){}
}
function updateBestRecordDisplay(){
  const best = getBest();
  $('best-record-display').textContent = best>0 ? ('この条件のサバイバル最高記録: '+best+'問') : '';
}

function filterPool(){
  if(state.range==='all') return ROUTES.slice();
  return ROUTES.filter(r=>r.cat===state.range);
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startQuiz(){
  state.pool = filterPool();
  if(state.pool.length < 4){
    alert('この範囲には問題が足りません。範囲を変えてください。');
    goSetup();
    return;
  }
  state.qIndex = 0;
  state.score = 0;
  state.total = state.mode==='survival' ? Infinity : parseInt(state.mode,10);
  state.survivalStreak = 0;
  showScreen('screen-quiz');
  nextQuestion();
}

function pickDistractors(correct, n){
  const candidates = state.pool.filter(r=>r.num!==correct.num);
  return shuffle(candidates).slice(0,n);
}

function hexHTML(size, numText){
  return `<div class="hexagon ${size}">
    <svg viewBox="0 0 150 130"><polygon points="38,2 112,2 148,65 112,128 38,128 2,65" fill="#1a5fb4" stroke="#ffffff" stroke-width="8"/></svg>
    <div class="hex-text"><div class="hex-top">京都</div><div class="hex-mid">${numText}</div><div class="hex-bottom">府道</div></div>
  </div>`;
}

function nextQuestion(){
  state.answered = false;
  if(state.mode!=='survival' && state.qIndex >= state.total){
    finishQuiz();
    return;
  }
  const correct = shuffle(state.pool)[0];
  const distractors = pickDistractors(correct, 3);
  const options = shuffle([correct, ...distractors]);
  state.current = { correct, options };

  const progText = state.mode==='survival'
    ? ('連続正解: ' + state.survivalStreak + '問')
    : ('問題 ' + (state.qIndex+1) + ' / ' + state.total);
  $('quiz-progress').textContent = progText;

  const top = $('quiz-top');
  const choicesEl = $('quiz-choices');
  $('quiz-feedback').textContent = '';
  $('quiz-feedback').className = 'feedback';

  if(state.dir==='num2name'){
    top.innerHTML = `<div class="hexwrap">${hexHTML('big', correct.num)}</div>`;
    choicesEl.innerHTML = options.map(o=>
      `<div class="choice-btn" data-num="${o.num}"><ruby>${o.name}<rt>${o.reading.replace('せん','せん')}</rt></ruby></div>`
    ).join('');
  } else {
    top.innerHTML = `<div class="name-card"><ruby>${correct.name}<rt>${correct.reading}</rt></ruby></div>`;
    choicesEl.innerHTML = options.map(o=>
      `<div class="choice-btn sign" data-num="${o.num}">${hexHTML('small', o.num)}</div>`
    ).join('');
  }

  choicesEl.querySelectorAll('.choice-btn').forEach(btn=>{
    btn.addEventListener('click', onAnswer);
  });
}

function onAnswer(e){
  if(state.answered) return;
  state.answered = true;
  const chosenNum = parseInt(e.currentTarget.dataset.num,10);
  const correctNum = state.current.correct.num;
  const isCorrect = chosenNum === correctNum;

  document.querySelectorAll('.choice-btn').forEach(btn=>{
    btn.classList.add('disabled');
    const n = parseInt(btn.dataset.num,10);
    if(n===correctNum) btn.classList.add('correct');
    else if(n===chosenNum) btn.classList.add('wrong');
  });

  const fb = $('quiz-feedback');
  if(isCorrect){
    fb.textContent = '正解！';
    fb.className = 'feedback correct';
    state.score++;
    state.survivalStreak++;
  } else {
    fb.textContent = '残念！ 正解は 府道' + correctNum + '号 ' + state.current.correct.name;
    fb.className = 'feedback wrong';
  }

  setTimeout(()=>{
    if(state.mode==='survival'){
      if(isCorrect){
        state.qIndex++;
        nextQuestion();
      } else {
        finishQuiz();
      }
    } else {
      state.qIndex++;
      nextQuestion();
    }
  }, isCorrect ? 900 : 1800);
}

function finishQuiz(){
  showScreen('screen-result');
  const box = $('result-box');
  if(state.mode==='survival'){
    const best = getBest();
    const isNewBest = state.survivalStreak > best;
    if(isNewBest) setBest(state.survivalStreak);
    box.innerHTML = `
      <div>サバイバル結果</div>
      <div class="result-score">${state.survivalStreak}問正解</div>
      ${isNewBest ? '<div class="badge">🎉 最高記録更新！</div>' : ''}
      <div class="best-record">最高記録: ${isNewBest?state.survivalStreak:best}問</div>
    `;
  } else {
    const perfect = state.score === state.total;
    box.innerHTML = `
      <div>結果</div>
      <div class="result-score">${state.score} / ${state.total} 問正解</div>
      ${perfect ? '<div class="badge">🏅 府道博士 認定！</div>' : ''}
    `;
  }
}
</script>
</body>
</html>
